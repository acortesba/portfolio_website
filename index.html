<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="refresh" content="0; url=portfolio/index.html">
  <title>Alberto Cortés - Portfolio</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      font-family: 'VT323', monospace;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }
    
    .redirect-message {
      text-align: center;
      padding: 2rem;
      background: rgba(255, 255, 255, 0.1);
      border: 3px solid rgba(255, 255, 255, 0.3);
      backdrop-filter: blur(10px);
      border-radius: 10px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
    }
    
    .redirect-message h1 {
      font-size: 2rem;
      margin-bottom: 1rem;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    
    .redirect-message p {
      font-size: 1.2rem;
      opacity: 0.9;
    }
    
    .redirect-message a {
      color: #fff;
      text-decoration: underline;
      cursor: pointer;
    }
    
    .redirect-message a:hover {
      opacity: 0.8;
    }
  </style>
  <script>
    // Immediate redirect to portfolio page
    window.location.href = 'portfolio/index.html';
  </script>
</head>
<body>
  <div class="redirect-message">
    <h1>Redirecting...</h1>
    <p>If you are not redirected automatically, <a href="portfolio/index.html">click here</a>.</p>
  </div>
</body>
</html>
